<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#1A1508;--cream:#F5F0E8;--cream2:#EDE6D8;--gold:#B8920A;--gold2:#D4AA30;--gold3:#E8C84A;--muted:#7A6E58;--faint:#A89880;--border:rgba(26,21,8,.08)}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--gold)}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 60px;background:rgba(26,21,8,.97);border-bottom:1px solid rgba(212,170,48,.08);backdrop-filter:blur(24px)}
.nav-brand{text-decoration:none;display:flex;align-items:center;gap:12px}
.nav-logo{height:38px;width:auto}
.nav-name{font-family:'Montserrat',sans-serif;font-weight:200;font-size:11px;letter-spacing:5px;color:var(--cream);text-transform:uppercase;display:block}
.nav-sub{font-size:7px;letter-spacing:4px;text-transform:uppercase;color:rgba(212,170,48,.4);display:block;margin-top:2px}
.nav-r{display:flex;align-items:center;gap:32px}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,240,232,.4);text-decoration:none;transition:color .3s}
.nav-links a:hover{color:var(--gold3)}
.nav-back{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);text-decoration:none;border:1px solid rgba(212,170,48,.3);padding:9px 20px;transition:all .3s}
.nav-back:hover{background:rgba(212,170,48,.08)}

.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,21,8,1) 0%,rgba(26,21,8,.5) 50%,rgba(26,21,8,.2) 100%)}
.hero-content{position:relative;z-index:2;padding:0 60px 72px;max-width:680px}
.h-tag{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.h-tag-line{width:28px;height:1px;background:var(--gold2)}
.h-tag span{font-family:'Montserrat',sans-serif;font-weight:300;font-size:8px;letter-spacing:5px;text-transform:uppercase;color:var(--gold2)}
.h-h1{font-family:'Playfair Display',serif;font-size:clamp(34px,5vw,58px);font-weight:400;line-height:1.1;color:var(--cream);margin-bottom:18px}
.h-h1 em{font-style:italic;color:var(--gold2)}
.h-p{font-size:13px;color:rgba(245,240,232,.5);line-height:1.9;margin-bottom:32px;max-width:420px}
.h-actions{display:flex;gap:14px}
.btn-gold{font-family:'Montserrat',sans-serif;font-weight:400;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--dark);background:var(--gold2);padding:14px 32px;text-decoration:none;transition:all .3s;display:inline-block}
.btn-gold:hover{background:var(--gold3)}
.btn-ghost{font-family:'Montserrat',sans-serif;font-weight:400;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold2);border:1px solid rgba(212,170,48,.35);padding:14px 32px;text-decoration:none;transition:all .3s;display:inline-block}
.btn-ghost:hover{border-color:var(--gold2);background:rgba(212,170,48,.06)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(212,170,48,.08)}
.stat{background:var(--dark);padding:24px 40px}
.stat-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold2);line-height:1}
.stat-num em{font-style:italic}
.stat-label{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,240,232,.25);margin-top:4px}
